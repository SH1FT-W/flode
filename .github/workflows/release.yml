name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared package
        run: yarn workspace @flode/shared build

      - name: Build transpiler package
        run: yarn workspace @flode/transpiler build

      - name: Build frontend
        run: yarn workspace @flode/frontend build

      - name: Verify www directory
        run: |
          ls -la custom_components/flode/
          ls -la custom_components/flode/www/
          ls -la custom_components/flode/www/assets/

      - name: Create release archive
        run: |
          cd custom_components/flode
          zip -r ../../flode.zip . -x "*.DS_Store"
          tar -czf ../../flode.tar.gz --exclude="*.DS_Store" .
          cd ../..
          echo "Archive erstellt:"
          ls -la *.zip *.tar.gz

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            flode.zip
            flode.tar.gz
          tag_name: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in manifest.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION=${VERSION#v}
          python3 -c "
          import json
          with open('custom_components/flode/manifest.json', 'r') as f:
              manifest = json.load(f)
          manifest['version'] = '${VERSION}'
          with open('custom_components/flode/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(f'✅ Version aktualisiert auf ${VERSION}')
          "

      - name: Commit version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add custom_components/flode/manifest.json
          git diff --staged --quiet || git commit -m "chore: version bump ${{ github.ref_name }}"
          git push
