<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>

  <!-- Connecting lines (drawn behind nodes) -->
  <!-- Vertical spine: top→mid, mid→bottom -->
  <line x1="30" y1="30" x2="30" y2="50" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="50" x2="30" y2="70" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Top crossbar -->
  <line x1="30" y1="30" x2="70" y2="30" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mid crossbar (shorter, like letter F) -->
  <line x1="30" y1="50" x2="58" y2="50" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arrowheads -->
  <polygon points="26,46 30,54 34,46" fill="#334155"/>
  <polygon points="26,66 30,74 34,66" fill="#334155"/>
  <polygon points="66,26 74,30 66,34" fill="#334155"/>
  <polygon points="54,46 62,50 54,54" fill="#334155"/>

  <!-- Left column nodes (sky blue) -->
  <circle cx="30" cy="30" r="9" fill="url(#node1)"/>
  <circle cx="30" cy="50" r="9" fill="url(#node1)"/>
  <circle cx="30" cy="70" r="9" fill="url(#node1)"/>

  <!-- Right crossbar nodes (violet) -->
  <circle cx="70" cy="30" r="9" fill="url(#node2)"/>
  <circle cx="58" cy="50" r="9" fill="url(#node2)"/>
</svg>
