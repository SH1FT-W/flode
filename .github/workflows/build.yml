name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared package
        run: yarn workspace @flode/shared build

      - name: Build transpiler package
        run: yarn workspace @flode/transpiler build

      - name: Build frontend
        run: yarn workspace @flode/frontend build

      - name: Run tests
        run: yarn test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flode
          path: custom_components/flode/
          retention-days: 30
