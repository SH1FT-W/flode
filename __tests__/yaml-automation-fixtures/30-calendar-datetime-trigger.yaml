alias: Calendar and datetime sensor triggers
description: Tests calendar trigger with offset and time trigger with sensor entity + offset
triggers:
  - trigger: calendar
    entity_id: calendar.work_calendar
    event: start
    offset: "-00:30:00"
  - trigger: time
    at:
      entity_id: sensor.alarm_time
      offset: "00:15:00"
actions:
  - action: light.turn_on
    target:
      entity_id: light.bedroom
mode: single
