name: HACS Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  validate:
    name: HACS Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands

      - name: Validate integration structure
        run: |
          if [ ! -f "custom_components/flode/manifest.json" ]; then
            echo "❌ manifest.json fehlt"
            exit 1
          fi
          if [ ! -f "custom_components/flode/__init__.py" ]; then
            echo "❌ __init__.py fehlt"
            exit 1
          fi
          if [ ! -f "hacs.json" ]; then
            echo "❌ hacs.json fehlt"
            exit 1
          fi
          echo "✅ Integrationsstruktur ist gültig"

      - name: Validate manifest.json
        run: |
          python3 -c "
          import json, sys
          with open('custom_components/flode/manifest.json') as f:
              m = json.load(f)
          missing = [k for k in ['domain','name','version','documentation_url','issue_tracker'] if k not in m]
          if missing:
              print(f'❌ Fehlende Felder in manifest.json: {missing}')
              sys.exit(1)
          print('✅ manifest.json gültig')
          "

  validate-frontend:
    name: Frontend Build Validierung
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build frontend
        run: yarn build

      - name: Validate frontend assets
        run: |
          if [ ! -f "custom_components/flode/www/index.html" ]; then
            echo "❌ Frontend Build fehlgeschlagen - index.html fehlt"
            exit 1
          fi
          if [ ! -d "custom_components/flode/www/assets" ]; then
            echo "❌ Frontend Build fehlgeschlagen - assets Verzeichnis fehlt"
            exit 1
          fi
          if [ -z "$(ls -A custom_components/flode/www/assets/)" ]; then
            echo "❌ Assets Verzeichnis ist leer"
            exit 1
          fi
          echo "✅ Frontend Build gültig"
