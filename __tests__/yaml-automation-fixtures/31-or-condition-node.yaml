alias: OR Condition Node Test
description: Tests an OR condition node with nested sub-conditions
triggers:
  - trigger: state
    entity_id: binary_sensor.motion
    to: "on"
actions:
  - if:
      - condition: or
        conditions:
          - condition: state
            entity_id: light.living_room
            state: "off"
          - condition: state
            entity_id: light.bedroom
            state: "off"
    then:
      - action: light.turn_on
        target:
          entity_id: light.all
    else:
      - action: light.turn_off
        target:
          entity_id: light.all
mode: single
